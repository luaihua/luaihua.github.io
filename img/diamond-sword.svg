<svg xmlns="http://www.w3.org/2000/svg" width="24" height="34" viewBox="0 0 24 34">
  <defs>
    <linearGradient id="blade" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D6F8FF"/>
      <stop offset="20%" stop-color="#7EE9FF"/>
      <stop offset="60%" stop-color="#3EC6E8"/>
      <stop offset="100%" stop-color="#1680A0"/>
    </linearGradient>
    <linearGradient id="bladeShine" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B3F0FF"/>
      <stop offset="100%" stop-color="#5CD6F0"/>
    </linearGradient>
  </defs>
  <!-- 钻石剑刃 -->
  <path d="M12 2 L13 2 L15 16 L12 18 L9 16 Z" fill="url(#blade)" stroke="#0E6A88" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- 剑刃高光线 -->
  <line x1="12" y1="3" x2="12" y2="15" stroke="#E8FBFF" stroke-width="0.8" opacity="0.9"/>
  <!-- 剑格 (护手) -->
  <rect x="4" y="17" width="16" height="2.5" rx="0.8" fill="#3A3A3A" stroke="#222" stroke-width="0.5"/>
  <rect x="5" y="17" width="14" height="1" rx="0.3" fill="#666" opacity="0.4"/>
  <!-- 剑柄 -->
  <rect x="8" y="19.5" width="8" height="9" rx="1" fill="#7A4A2E" stroke="#4A2A1A" stroke-width="0.5"/>
  <!-- 剑柄防滑纹 -->
  <rect x="8" y="20.5" width="8" height="1.2" rx="0.4" fill="#5A3520"/>
  <rect x="8" y="23" width="8" height="1.2" rx="0.4" fill="#5A3520"/>
  <rect x="8" y="25.5" width="8" height="1.2" rx="0.4" fill="#5A3520"/>
  <!-- 底部钻石装饰 -->
  <polygon points="10,30 12,28.5 14,30 12,31.5" fill="#5CD6F0" stroke="#1A8FB0" stroke-width="0.5"/>
  <polygon points="10.5,30 12,29 13.5,30 12,31" fill="#B3F0FF" opacity="0.6"/>
</svg>
